<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Packages - TravelHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">✈️ TravelHub</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="packages.html">Packages</a></li>
                    <li class="nav-item"><a class="nav-link" href="destinations.html">Destinations</a></li>
                    <li class="nav-item"><a class="nav-link" href="booking.html">Book Now</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                    <li class="nav-item"><a class="nav-link" href="admin.html">Admin</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <div class="mb-5">
            <h1 class="mb-2">🎒 Travel Packages</h1>
            <p class="lead text-muted">Choose from our curated collection of amazing travel packages</p>
        </div>
        
        <!-- Filter Section -->
        <div class="row mb-5">
            <div class="col-md-12">
                <div class="input-group">
                    <input type="text" class="form-control form-control-lg" 
                           id="search-packages" 
                           placeholder="Search packages by destination...">
                    <button class="btn btn-primary" type="button" onclick="filterPackages()">Search</button>
                </div>
            </div>
        </div>
        
        <div id="packages-container" class="row g-4 mb-5">
            <!-- Packages will be loaded here -->
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p>&copy; 2024 TravelHub - All Rights Reserved</p>
            <p>Contact: info@travelhub.com | Phone: +1-800-TRAVEL-1</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Filter packages based on search
        function filterPackages() {
            const searchTerm = document.getElementById('search-packages').value.toLowerCase();
            const cards = document.querySelectorAll('#packages-container .col-lg-4');
            
            cards.forEach(card => {
                const text = card.textContent.toLowerCase();
                if (text.includes(searchTerm)) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }

        // Allow search on enter key
        document.getElementById('search-packages')?.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                filterPackages();
            }
        });
    </script>
</body>
</html>
