<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - TravelHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">✈️ TravelHub</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" id="logout-btn" onclick="logout()" style="display: none;">Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Login Section -->
    <div id="login-section" class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body">
                        <h3 class="card-title text-center mb-4">Admin Login</h3>
                        <form id="login-form">
                            <div class="mb-3">
                                <label for="username" class="form-label">Username *</label>
                                <input type="text" class="form-control" id="username" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">Password *</label>
                                <input type="password" class="form-control" id="password" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Login</button>
                        </form>
                        <div id="login-error" class="alert alert-danger mt-3" style="display: none;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Dashboard Section -->
    <div id="dashboard-section" style="display: none;" class="container-fluid mt-4">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-3 bg-light p-3">
                <div class="list-group">
                    <button class="list-group-item list-group-item-action active" onclick="showTab('packages')">📦 Packages</button>
                    <button class="list-group-item list-group-item-action" onclick="showTab('destinations')">🗺️ Destinations</button>
                    <button class="list-group-item list-group-item-action" onclick="showTab('bookings')">📝 Bookings</button>
                    <button class="list-group-item list-group-item-action" onclick="showTab('contacts')">📧 Contacts</button>
                </div>
            </div>

            <!-- Main Content -->
            <div class="col-md-9">
                <!-- Packages Section -->
                <div id="packages-tab" class="content-tab">
                    <h2>Manage Packages</h2>
                    <button class="btn btn-success mb-3" onclick="showAddPackageForm()">+ Add New Package</button>
                    
                    <div id="add-package-form" style="display: none;" class="card mb-4">
                        <div class="card-body">
                            <h5>Add New Package</h5>
                            <form id="package-form">
                                <div class="mb-3">
                                    <label for="pkg-title" class="form-label">Title *</label>
                                    <input type="text" class="form-control" id="pkg-title" required>
                                </div>
                                <div class="mb-3">
                                    <label for="pkg-location" class="form-label">Location *</label>
                                    <input type="text" class="form-control" id="pkg-location" required>
                                </div>
                                <div class="mb-3">
                                    <label for="pkg-price" class="form-label">Price *</label>
                                    <input type="number" class="form-control" id="pkg-price" required>
                                </div>
                                <div class="mb-3">
                                    <label for="pkg-duration" class="form-label">Duration *</label>
                                    <input type="text" class="form-control" id="pkg-duration" required>
                                </div>
                                <div class="mb-3">
                                    <label for="pkg-description" class="form-label">Description *</label>
                                    <textarea class="form-control" id="pkg-description" rows="3" required></textarea>
                                </div>
                                <div class="mb-3">
                                    <label for="pkg-image" class="form-label">Image URL</label>
                                    <input type="text" class="form-control" id="pkg-image">
                                </div>
                                <button type="submit" class="btn btn-primary">Create Package</button>
                                <button type="button" class="btn btn-secondary" onclick="hideAddPackageForm()">Cancel</button>
                            </form>
                        </div>
                    </div>

                    <div id="packages-list" class="row g-3"></div>
                </div>

                <!-- Destinations Section -->
                <div id="destinations-tab" class="content-tab" style="display: none;">
                    <h2>Manage Destinations</h2>
                    <button class="btn btn-success mb-3" onclick="showAddDestinationForm()">+ Add New Destination</button>
                    
                    <div id="add-destination-form" style="display: none;" class="card mb-4">
                        <div class="card-body">
                            <h5>Add New Destination</h5>
                            <form id="destination-form">
                                <div class="mb-3">
                                    <label for="dest-name" class="form-label">Name *</label>
                                    <input type="text" class="form-control" id="dest-name" required>
                                </div>
                                <div class="mb-3">
                                    <label for="dest-country" class="form-label">Country *</label>
                                    <input type="text" class="form-control" id="dest-country" required>
                                </div>
                                <div class="mb-3">
                                    <label for="dest-description" class="form-label">Description *</label>
                                    <textarea class="form-control" id="dest-description" rows="3" required></textarea>
                                </div>
                                <div class="mb-3">
                                    <label for="dest-image" class="form-label">Image URL</label>
                                    <input type="text" class="form-control" id="dest-image">
                                </div>
                                <button type="submit" class="btn btn-primary">Create Destination</button>
                                <button type="button" class="btn btn-secondary" onclick="hideAddDestinationForm()">Cancel</button>
                            </form>
                        </div>
                    </div>

                    <div id="destinations-list" class="row g-3"></div>
                </div>

                <!-- Bookings Section -->
                <div id="bookings-tab" class="content-tab" style="display: none;">
                    <h2>View Bookings</h2>
                    <div id="bookings-list" class="table-responsive">
                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Package</th>
                                    <th>Date</th>
                                    <th>Persons</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="bookings-tbody"></tbody>
                        </table>
                    </div>
                </div>

                <!-- Contacts Section -->
                <div id="contacts-tab" class="content-tab" style="display: none;">
                    <h2>View Contact Messages</h2>
                    <div id="contacts-list" class="table-responsive">
                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Message</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="contacts-tbody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p>&copy; 2024 TravelHub - All Rights Reserved</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
